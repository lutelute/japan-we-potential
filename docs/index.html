<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>全国 風力発電適地スコアマップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{margin:0;padding:0;height:100%;font-family:-apple-system,'Hiragino Sans',sans-serif}
#map{width:100%;height:100%}
#controls{position:absolute;top:10px;left:60px;z-index:1000;background:white;
  padding:10px 14px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.35);font-size:12px;
  max-height:90vh;overflow-y:auto;width:240px}
#controls h3{margin:8px 0 4px;font-size:13px;border-bottom:1px solid #ddd;padding-bottom:2px}
#controls select{font-size:12px;padding:3px 6px;width:100%}
#controls label{display:block;margin:2px 0;cursor:pointer;font-size:11px}
#controls label input{margin-right:4px}
#legend{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:1000;
  background:rgba(255,255,255,0.93);padding:6px 16px;border-radius:8px;
  box-shadow:0 2px 10px rgba(0,0,0,.35);font-size:11px;
  display:flex;gap:18px;align-items:flex-start;white-space:nowrap}
#legend .block{display:flex;flex-direction:column;gap:1px}
#legend .block b{margin-bottom:2px;font-size:11px}
#legend .item{display:flex;align-items:center;gap:4px;margin:1px 0}
#legend .box{width:14px;height:14px;border-radius:2px;flex-shrink:0}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2000;
  background:rgba(0,0,0,.75);color:white;padding:20px 40px;border-radius:10px;font-size:16px;display:none}
.sub-label{font-size:10px;font-weight:bold;border:none;box-shadow:none;background:transparent;
  text-shadow:1px 1px 1px white,-1px -1px 1px white,1px -1px 1px white,-1px 1px 1px white}
#sublist{position:absolute;bottom:30px;right:10px;z-index:1000;background:white;
  padding:8px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.35);font-size:10px;
  max-height:50vh;width:220px;overflow:hidden}
#sublist input{width:100%;box-sizing:border-box;font-size:10px;padding:4px;margin-bottom:4px;border:1px solid #ccc;border-radius:3px}
#sublist .list{overflow-y:auto;max-height:calc(50vh - 70px)}
#sublist .entry{cursor:pointer;padding:3px 5px;border-left:3px solid #999;margin:1px 0}
#sublist .entry:hover{background:#e8f5e8}
.tab-btns{display:flex;gap:2px;margin-bottom:4px}
.tab-btns button{flex:1;font-size:10px;padding:3px;border:1px solid #ccc;cursor:pointer;background:#f5f5f5;border-radius:3px}
.tab-btns button.active{background:#1565c0;color:white;border-color:#1565c0}
</style>
</head>
<body>
<div id="map"></div>

<div id="controls">
  <b style="font-size:14px">全国 風力適地スコア</b>

  <h3>電力エリア</h3>
  <select id="areaSelect" onchange="switchArea(this.value)">
    <option value="all" selected>全国表示</option>
    <option value="hokkaido">北海道</option>
    <option value="tohoku">東北</option>
    <option value="tokyo">東京</option>
    <option value="chubu">中部</option>
    <option value="hokuriku">北陸</option>
    <option value="kansai">関西</option>
    <option value="chugoku">中国</option>
    <option value="shikoku">四国</option>
    <option value="kyushu">九州</option>
    <option value="okinawa">沖縄</option>
  </select>

  <h3>都道府県</h3>
  <select id="prefSelect" onchange="switchPref(this.value)">
    <option value="all">-- エリア内全表示 --</option>
  </select>

  <h3>表示モード</h3>
  <select id="modeSelect" onchange="switchScoreMode(this.value)">
    <option value="total">総合スコア</option>
    <option value="wind_speed">風速スコア</option>
    <option value="slope">傾斜スコア</option>
    <option value="elevation">標高スコア</option>
    <option value="grid_dist">送電線距離スコア (154kV+)</option>
    <option value="sub_dist">変電所距離スコア (66kV+)</option>
    <option value="land_use">土地利用スコア</option>
    <option value="residential_dist">居住地距離スコア</option>
  </select>

  <h3>スコアオーバーレイ</h3>
  <label><input type="checkbox" id="chkScore" checked onchange="toggleScoreLayer()"> 適地スコア表示</label>
  <div style="margin-left:18px">
    <label><input type="range" id="opacitySlider" min="0" max="100" value="75" oninput="setOpacity(this.value)"> 透過度</label>
  </div>

  <h3>電力系統</h3>
  <label><input type="checkbox" id="chkLines" onchange="toggleGrid('lines')"> 送電線</label>
  <label><input type="checkbox" id="chkSubs" onchange="toggleGrid('subs')"> 変電所</label>
  <label><input type="checkbox" id="chkPlants" onchange="toggleGrid('plants')"> 発電所</label>

  <h3>ハザードマップ</h3>
  <small style="color:#888">国土交通省タイル重畳</small>
  <label><input type="checkbox" id="chkFlood" onchange="toggleHazard('flood')"> 洪水浸水想定</label>
  <label><input type="checkbox" id="chkSediment" onchange="toggleHazard('sediment')"> 土砂災害警戒</label>
  <label><input type="checkbox" id="chkTsunami" onchange="toggleHazard('tsunami')"> 津波浸水想定</label>
</div>

<div id="legend">
  <div class="block" id="legend-mode">
    <b id="legend-mode-title">風力適地 総合スコア</b>
    <div id="legend-mode-desc" style="font-size:10px;color:#555;margin:2px 0 4px;line-height:1.4;max-width:160px">
      AHP重み付け総合評価<br>風速30%・送電線15%・傾斜12%<br>変電所10%・土地10%・居住地8%
    </div>
    <div class="item"><div class="box" style="background:#006400"></div>80-100 最適</div>
    <div class="item"><div class="box" style="background:#228B22"></div>60-79 良好</div>
    <div class="item"><div class="box" style="background:#DAA520"></div>40-59 中程度</div>
    <div class="item"><div class="box" style="background:#FF8C00"></div>20-39 低い</div>
    <div class="item"><div class="box" style="background:#DC143C"></div>0-19 不適</div>
  </div>
  <div class="block">
    <b>送電線</b>
    <div class="item"><div style="width:20px;height:5px;background:#cc0000"></div>500kV</div>
    <div class="item"><div style="width:20px;height:4px;background:#e65100"></div>275kV</div>
    <div class="item"><div style="width:20px;height:3.5px;background:#ff8f00"></div>220kV</div>
    <div class="item"><div style="width:20px;height:3px;background:#1565c0"></div>154kV</div>
    <div class="item"><div style="width:20px;height:2.5px;background:#0288d1"></div>110kV</div>
    <div class="item"><div style="width:20px;height:2px;background:#2e7d32"></div>66kV</div>
    <div class="item"><div style="width:20px;height:1.5px;background:#66bb6a"></div>33kV</div>
  </div>
  <div class="block">
    <b>発電所</b>
    <div class="item"><div class="box" style="background:#f5c542;border-radius:50%"></div>太陽光</div>
    <div class="item"><div class="box" style="background:#42a5f5;border-radius:50%"></div>水力</div>
    <div class="item"><div class="box" style="background:#66bb6a;border-radius:50%"></div>風力</div>
    <div class="item"><div class="box" style="background:#ef5350;border-radius:50%"></div>火力</div>
    <div class="item"><div class="box" style="background:#ab47bc;border-radius:50%"></div>原子力</div>
    <div class="item"><div class="box" style="background:#78909c;border-radius:50%"></div>その他</div>
  </div>
</div>

<div id="sublist">
  <div class="tab-btns">
    <button class="active" onclick="showTab('subs',this)">変電所</button>
    <button onclick="showTab('lines',this)">送電線</button>
  </div>
  <input type="text" placeholder="検索..." oninput="filterList(this.value)">
  <div style="display:flex;gap:2px;margin-bottom:4px">
    <small>並替:</small>
    <button style="font-size:9px;padding:1px 4px;cursor:pointer" onclick="sortList('name')" id="sortName" class="active">50音順</button>
    <button style="font-size:9px;padding:1px 4px;cursor:pointer" onclick="sortList('area')">地区順</button>
    <button style="font-size:9px;padding:1px 4px;cursor:pointer" onclick="sortList('voltage')">電圧順</button>
  </div>
  <div id="tab-subs" class="list"></div>
  <div id="tab-lines" class="list" style="display:none"></div>
</div>

<div id="loading">読み込み中...</div>

<script>
const map = L.map('map').setView([36.5, 137.0], 6);

map.createPane('scoreBase'); map.getPane('scoreBase').style.zIndex = 295; map.getPane('scoreBase').style.pointerEvents = 'none';
map.createPane('score'); map.getPane('score').style.zIndex = 300; map.getPane('score').style.pointerEvents = 'none';
map.createPane('hazard'); map.getPane('hazard').style.zIndex = 450; map.getPane('hazard').style.pointerEvents = 'none';
map.createPane('substations'); map.getPane('substations').style.zIndex = 500;

const bases = {
  'CartoDB': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'CartoDB',maxZoom:19}),
  'OSM': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM',maxZoom:19}),
  'Google 衛星': L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{attribution:'Google',maxZoom:20}),
  '国土地理院': L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',{attribution:'GSI',maxZoom:18}),
  '航空写真': L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',{attribution:'GSI',maxZoom:18}),
};
bases['CartoDB'].addTo(map);
L.control.layers(bases,null,{position:'topright'}).addTo(map);

const hazardLayers = {
  flood: L.tileLayer('https://disaportaldata.gsi.go.jp/raster/01_flood_l2_shinsuishin_data/{z}/{x}/{y}.png',
    {attribution:'国土交通省',maxNativeZoom:17,maxZoom:20,opacity:0.6,pane:'hazard'}),
  sediment: L.tileLayer('https://disaportaldata.gsi.go.jp/raster/05_dosekiryukeikaikuiki/{z}/{x}/{y}.png',
    {attribution:'国土交通省',maxNativeZoom:17,maxZoom:20,opacity:0.6,pane:'hazard'}),
  tsunami: L.tileLayer('https://disaportaldata.gsi.go.jp/raster/04_tsunami_newlegend_data/{z}/{x}/{y}.png',
    {attribution:'国土交通省',maxNativeZoom:17,maxZoom:20,opacity:0.6,pane:'hazard'}),
};

// ── データ ─────────────────────────────────────────
let prefData = {};
let gridLayers = { lines: [], subs: [], plants: [] };
let currentArea = 'all';
let currentScoreMode = 'total';
let scoreOpacity = 0.75;
let subsData = [];
let linesListData = [];
let currentTab = 'subs';
let currentSort = 'name';

const areaCenters = {
  all: [36.5, 137.0, 6],
  hokkaido: [43.3, 142.5, 7],
  tohoku: [39.5, 140.3, 7],
  tokyo: [36.0, 139.8, 8],
  chubu: [35.5, 137.5, 7],
  hokuriku: [36.3, 136.8, 8],
  kansai: [34.7, 135.5, 8],
  chugoku: [34.6, 132.8, 8],
  shikoku: [33.7, 133.5, 8],
  kyushu: [32.5, 131.0, 7],
  okinawa: [26.5, 127.8, 8],
};

const gridAreaFiles = [
  'hokkaido','tohoku','tokyo','chubu','hokuriku','kansai','chugoku','shikoku','kyushu','okinawa'
];

function toKv(f){
  // voltage_kv があればそのまま、なければ voltage (V単位文字列) から変換
  let v = f.properties.voltage_kv;
  if(v && v > 0) return v;
  const raw = f.properties.voltage;
  if(!raw) return 0;
  v = parseFloat(String(raw).replace(/,/g,''));
  return v > 1000 ? v/1000 : v;
}

function vColor(v){
  if(v>=500)return'#cc0000';
  if(v>=275)return'#e65100';
  if(v>=220)return'#ff8f00';
  if(v>=154)return'#1565c0';
  if(v>=110)return'#0288d1';
  if(v>=66) return'#2e7d32';
  if(v>=33) return'#66bb6a';
  return'#9e9e9e';
}

function fuelColor(fuel){
  const f=(fuel||'').toLowerCase();
  if(f.includes('solar')||f.includes('photovoltaic'))return'#f5c542';
  if(f.includes('hydro')||f.includes('water'))return'#42a5f5';
  if(f.includes('wind'))return'#66bb6a';
  if(f.includes('coal')||f.includes('gas')||f.includes('oil')||f.includes('thermal'))return'#ef5350';
  if(f.includes('nuclear'))return'#ab47bc';
  return'#78909c';
}

function showLoading(v){document.getElementById('loading').style.display=v?'block':'none';}

// ── スコアレイヤー (2層構成: 下地z=9コンポジット + 上層z=10-11 hires) ────
// 下地: maxNativeZoom=9 → z>9で upscale、排除ゾーンの穴を埋める
// 上層: minZoom=10, maxNativeZoom=11 → 30mhiresタイルで上書き
let scoreTileLayer = null;
let scoreBgLayer   = null;

function _tileUrl(mode){ return `tiles/${mode}/{z}/{x}/{y}.png?v=20260513`; }

function ensureScoreTileLayer(){
  if(scoreTileLayer) return;
  scoreBgLayer = L.tileLayer(_tileUrl(currentScoreMode), {
    minZoom: 5, maxNativeZoom: 9, maxZoom: 18,
    opacity: scoreOpacity, pane: 'scoreBase',
    attribution: '', tileSize: 256
  });
  scoreTileLayer = L.tileLayer(_tileUrl(currentScoreMode), {
    minZoom: 10, maxNativeZoom: 11, maxZoom: 18,
    opacity: scoreOpacity, pane: 'score',
    attribution: '', tileSize: 256
  });
}

function toggleScoreLayer(){
  const on = document.getElementById('chkScore').checked;
  ensureScoreTileLayer();
  if(on){
    if(!map.hasLayer(scoreBgLayer))   scoreBgLayer.addTo(map);
    if(!map.hasLayer(scoreTileLayer)) scoreTileLayer.addTo(map);
  } else {
    if(map.hasLayer(scoreBgLayer))   map.removeLayer(scoreBgLayer);
    if(map.hasLayer(scoreTileLayer)) map.removeLayer(scoreTileLayer);
  }
}

function setOpacity(val){
  scoreOpacity = val/100;
  if(scoreBgLayer)   scoreBgLayer.setOpacity(scoreOpacity);
  if(scoreTileLayer) scoreTileLayer.setOpacity(scoreOpacity);
}

const MODE_INFO = {
  total:            {title:'風力適地 総合スコア',    desc:'AHP重み付け総合評価<br>風速30% / 送電線15% / 傾斜12%<br>変電所10% / 土地10% / 居住地8%<br>標高5% / 道路5% / 保護区5%'},
  wind_speed:       {title:'風速スコア',             desc:'ERA5 100m高さ 年間平均風速<br>1.5 m/s → 0点（不適）<br>5.0 m/s → 100点（最適）'},
  slope:            {title:'傾斜スコア',             desc:'SRTM 30m DEM 傾斜角<br>&lt;5° → 100点（平坦・最適）<br>15〜20° → 30点<br>&gt;30° → 0点（建設不可）'},
  elevation:        {title:'標高スコア',             desc:'SRTM 30m DEM 標高<br>500〜1000m → 100点（尾根風・最適）<br>&lt;200m → 70点（平野部）<br>&gt;2000m → 10点（高山）'},
  grid_dist:        {title:'送電線距離スコア',       desc:'154kV以上送電線からの距離<br>0m → 100点（接続コスト小）<br>5km → 50点<br>20km → 0点（接続困難）'},
  sub_dist:         {title:'変電所距離スコア',       desc:'66kV以上変電所からの距離<br>0m → 100点<br>5km → 50点<br>20km → 0点'},
  land_use:         {title:'土地利用スコア',         desc:'OSM 土地利用分類<br>荒地・草地 → 90点（最適）<br>農地 → 60点<br>森林 → 20点<br>建物・道路 → 0点（不適）'},
  residential_dist: {title:'居住地距離スコア',       desc:'騒音バッファ（風力規制）<br>&lt;500m → 0点（排除ゾーン）<br>1〜2km → 70点<br>&gt;3km → 100点（適地）'},
};

function switchScoreMode(mode){
  currentScoreMode = mode;
  const url = _tileUrl(mode);
  if(scoreBgLayer)   scoreBgLayer.setUrl(url);
  if(scoreTileLayer) scoreTileLayer.setUrl(url);
  // 凡例を更新
  const info = MODE_INFO[mode] || MODE_INFO.total;
  document.getElementById('legend-mode-title').textContent = info.title;
  document.getElementById('legend-mode-desc').innerHTML = info.desc;
}

// エリア/県別表示はマップ移動だけで、タイルレイヤー自体は全国常時表示。
function loadScoreForArea(_area){ /* no-op for tile layer */ }

// ── 電力系統 ──────────────────────────────────────
function clearGridLayers(){
  gridLayers.lines.forEach(l=>map.removeLayer(l));
  gridLayers.subs.forEach(l=>map.removeLayer(l));
  gridLayers.plants.forEach(l=>map.removeLayer(l));
  gridLayers={lines:[],subs:[],plants:[]};
  subsData=[];
  linesListData=[];
}

async function loadGridForArea(area){
  const areas = area==='all' ? gridAreaFiles : [area];
  for(const a of areas){
    try{
      const r=await fetch(`grid/${a}_lines.geojson`);
      const d=await r.json();
      const ly=L.geoJSON(d,{
        style:f=>{const v=toKv(f);
          return{color:vColor(v),weight:v>=500?5:v>=275?4:v>=220?3.5:v>=154?3:v>=110?2.5:v>=66?2:1.5,opacity:0.7};},
        onEachFeature:(f,l)=>{
          const n=f.properties.name||'';const v=toKv(f);
          if(n){
            l.bindTooltip(`${n} (${v}kV)`,{sticky:true});
            linesListData.push({name:n,v,area:a,layer:l});
          }
        }
      });
      if(document.getElementById('chkLines').checked)ly.addTo(map);
      gridLayers.lines.push(ly);
    }catch(e){}

    try{
      const r=await fetch(`grid/${a}_substations.geojson`);
      const d=await r.json();
      const ly=L.layerGroup();
      d.features.forEach(f=>{
        const v=toKv(f);
        const n=f.properties.name||'';
        let lat,lon;const g=f.geometry;
        if(g.type==='Point'){lon=g.coordinates[0];lat=g.coordinates[1];}
        else if(g.type==='Polygon'){const c=g.coordinates[0];lat=c.reduce((s,p)=>s+p[1],0)/c.length;lon=c.reduce((s,p)=>s+p[0],0)/c.length;}
        else if(g.type==='MultiPolygon'){const c=g.coordinates[0][0];lat=c.reduce((s,p)=>s+p[1],0)/c.length;lon=c.reduce((s,p)=>s+p[0],0)/c.length;}
        if(!lat||!lon)return;
        const m=L.circleMarker([lat,lon],{radius:v>=275?8:v>=154?6:v>=66?4:3,
          color:vColor(v),fillColor:vColor(v),fillOpacity:0.7,weight:1.5,pane:'substations'});
        
        if(n)m.bindTooltip(n,{sticky:true});
        m.addTo(ly);
        if(n)subsData.push({name:n,v,lat,lon,area:a});
      });
      if(document.getElementById('chkSubs').checked)ly.addTo(map);
      gridLayers.subs.push(ly);
    }catch(e){}

    try{
      const r=await fetch(`grid/${a}_plants_lite.geojson`);
      const d=await r.json();
      const ly=L.layerGroup();
      d.features.forEach(f=>{
        const n=f.properties.name||'';
        const fuel=f.properties.fuel||'';
        const output=f.properties.output||'';
        const c=f.geometry.coordinates;
        const col=fuelColor(fuel);
        const m=L.circleMarker([c[1],c[0]],{radius:3,color:col,fillColor:col,fillOpacity:0.8,weight:0.5});
        m.bindTooltip(`<b>${n}</b>${fuel?' ('+fuel+')':''}${output?' '+output:''}`,{sticky:true});
        m.addTo(ly);
      });
      if(document.getElementById('chkPlants').checked)ly.addTo(map);
      gridLayers.plants.push(ly);
    }catch(e){}
  }
  buildSubsList();
  buildLinesList();
}

function toggleGrid(type){
  const id=type==='lines'?'chkLines':type==='subs'?'chkSubs':'chkPlants';
  const on=document.getElementById(id).checked;
  if(on && gridLayers[type].length===0){
    loadGridForArea(currentArea);
    return;
  }
  gridLayers[type].forEach(l=>{if(on)l.addTo(map);else map.removeLayer(l);});
}

function toggleHazard(type){
  const chk=document.getElementById('chk'+type.charAt(0).toUpperCase()+type.slice(1));
  if(chk.checked)hazardLayers[type].addTo(map);else map.removeLayer(hazardLayers[type]);
}

// ── 変電所・送電線リスト ──────────────────────────────
function buildSubsList(){
  const el=document.getElementById('tab-subs');
  const sorted=sortData([...subsData],currentSort);
  el.innerHTML=sorted.map(s=>
    `<div class="entry" style="border-left-color:${vColor(s.v)}" onclick="map.setView([${s.lat},${s.lon}],14)">
      <b>${s.name}</b> <small style="color:#888">${s.v>0?s.v+'kV':''}${s.area?' ('+s.area+')':''}</small>
    </div>`
  ).join('');
  document.querySelector('#sublist .tab-btns button:first-child').textContent=`変電所 (${subsData.length})`;
}

function buildLinesList(){
  const el=document.getElementById('tab-lines');
  const sorted=sortData([...linesListData],currentSort);
  el.innerHTML=sorted.map(s=>
    `<div class="entry" style="border-left-color:${vColor(s.v)}" onclick="map.fitBounds(linesListData.find(l=>l.name==='${s.name.replace(/'/g,"\\'")}')?.layer?.getBounds())">
      <b>${s.name}</b> <small style="color:#888">${s.v>0?s.v+'kV':''}${s.area?' ('+s.area+')':''}</small>
    </div>`
  ).join('');
  document.querySelector('#sublist .tab-btns button:last-child').textContent=`送電線 (${linesListData.length})`;
}

function sortData(arr,mode){
  if(mode==='name')return arr.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  if(mode==='voltage')return arr.sort((a,b)=>b.v-a.v);
  if(mode==='area')return arr.sort((a,b)=>(a.area||'').localeCompare(b.area||'')||a.name.localeCompare(b.name,'ja'));
  return arr;
}

function showTab(tab,btn){
  currentTab=tab;
  document.getElementById('tab-subs').style.display=tab==='subs'?'':'none';
  document.getElementById('tab-lines').style.display=tab==='lines'?'':'none';
  document.querySelectorAll('#sublist .tab-btns button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function filterList(q){
  const el=document.getElementById('tab-'+currentTab);
  const entries=el.querySelectorAll('.entry');
  const ql=q.toLowerCase();
  entries.forEach(e=>{e.style.display=e.textContent.toLowerCase().includes(ql)?'':'none';});
}

function sortList(mode){
  currentSort=mode;
  document.querySelectorAll('#sublist button[id^=sort]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('sort'+mode.charAt(0).toUpperCase()+mode.slice(1));
  if(btn)btn.classList.add('active');
  buildSubsList();
  buildLinesList();
}

// ── エリア・県切替 ──────────────────────────────────
function updatePrefSelect(area){
  const sel=document.getElementById('prefSelect');
  sel.innerHTML='<option value="all">-- エリア内全表示 --</option>';
  for(const [key,d] of Object.entries(prefData)){
    if(area==='all'||d.grid_area===area){
      sel.innerHTML+=`<option value="${key}">${d.name_ja}</option>`;
    }
  }
}

function switchArea(area){
  currentArea=area;
  const [lat,lon,zoom]=areaCenters[area]||areaCenters.all;
  map.setView([lat,lon],zoom);
  updatePrefSelect(area);
  clearGridLayers();
  loadScoreForArea(area);
  if(area!=='all') loadGridForArea(area);
}

function switchPref(key){
  if(key==='all'){switchArea(currentArea);return;}
  const d=prefData[key];
  if(!d)return;
  map.fitBounds(d.bounds,{padding:[20,20]});
}

// ── 初期化 ─────────────────────────────────────────
async function init(){
  showLoading(true);
  try{
    const r=await fetch('prefectures.json');
    prefData=await r.json();
    updatePrefSelect('all');
    ensureScoreTileLayer();
    if(document.getElementById('chkScore').checked) scoreTileLayer.addTo(map);
    // system layers loaded on area select only
  }catch(e){
    console.error('Init error:',e);
  }
  showLoading(false);
}

init();
</script>
